# Workflow to build atlantis and run on a mac
# Only difference is a conditional statement in the PreRules.am file
name: build_run_SETAS1_mac

on:
  push:
    branches: [main, master, dev, workflow_attest]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  runAtlantis1:
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write

    steps:
    
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensures all branches and tags are fetched

      - name: Store branch name as a variable
        run: |
          echo "MY_BRANCH=$(git branch --show-current)" >> $GITHUB_ENV
          echo $MY_BRANCH
        shell: bash

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2.0'

      - name: Setup Docker (Colima) on macOS
        run: |
          # 1. Install Docker CLI and Colima (a container runtime) via Homebrew
          brew install docker colima
          brew install qemu
          brew install lima-additional-guestagents
          
          # 2. Cleanup: Delete any previous/default Colima profile and configuration
          colima delete --force || true
          
          # 3. Start the Colima VM (re-attempting with a clean slate)
          echo "Starting Colima..."
          # Try setting minimal resources and forcing a specific Arch (x86_64 is often more stable)
          colima start --cpu 2 --memory 4 --arch x86_64 --runtime docker
          

          # 4. Verify the installation
          echo "Docker is ready!"
          docker info
        
        shell: bash

      - name: Compile and Run Atlantis in Ubuntu 18.04 using Docker
        run: |
          docker run --rm -v $(pwd):/workspace -w /workspace ubuntu:18.04 bash -c "
          TZ=America/New_York &&
          ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone &&
          apt-get update && 
          apt-get install  -yq build-essential autoconf libnetcdf-dev libxml2-dev libproj-dev subversion valgrind dos2unix gawk nano r-base &&
          cd atlantis && aclocal && autoheader && autoconf && automake -a && ./configure --enable-rassesslink && make && make install
        shell: bash
        
      - name: Run Atlantis in Ubuntu 18.04 using Docker  
        run: |
          echo 'Now run the model!' &&
          cd ../example &&
          atlantisMerged -i INIT_VMPA_Jan2015.nc 0 -o outputSETAS.nc -r VMPA_setas_run_fishing_F_Trunk.prm -f VMPA_setas_force_fish_Trunk.prm -p VMPA_setas_physics.prm -b VMPA_setas_biol_fishing_Trunk.prm -m SETas_Migrations.csv -h VMPA_setas_harvest_F_Trunk.prm  -s SETasGroupsDem.csv -q SETasFisheries.csv -d testFolder > out.txt 
          "
        shell: bash
        
        
      - name: Parse and Validate
      # read in log file and check for "Atlantis Done" + other related tests to
      # check why Atlantis may have failed
        run: |
          source("data-raw/test_setas_model.R")
          test_setas_model()
        shell: Rscript {0}

      # - name: Write out log file
      #   run: |
      #     cat example/testFolder/log.txt
      #   shell: bash
  
          